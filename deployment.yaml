
---

# 📄 `deployment.yaml`

```yaml
apiVersion: apps/v1
kind: Deployment

metadata:
  name: k8s-simple-deployment
  labels:
    app: k8s-simple-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: k8s-simple-app

  template:
    metadata:
      labels:
        app: k8s-simple-app

    spec:
      containers:
        - name: k8s-simple-app
          image: nginx:latest

          ports:
            - containerPort: 80
